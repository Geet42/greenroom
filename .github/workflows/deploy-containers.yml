name: Deploy Containers

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "piston/**"
      - ".github/workflows/deploy-containers.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/greenroom-api
  PISTON_IMAGE: ghcr.io/${{ github.repository_owner }}/greenroom-piston

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      piston_tag: ${{ steps.meta-piston.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Piston image
        id: meta-piston
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PISTON_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Piston image
        uses: docker/build-push-action@v5
        with:
          context: piston
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-piston.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name greenroom-api \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.API_IMAGE }}:latest \
              --set-env-vars \
                GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
                GROQ_MODEL="${{ secrets.GROQ_MODEL }}" \
                SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
                SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
                FALLBACK_BASE_URL="${{ secrets.FALLBACK_BASE_URL }}" \
                FALLBACK_API_KEY="${{ secrets.FALLBACK_API_KEY }}" \
                FALLBACK_MODEL="${{ secrets.FALLBACK_MODEL }}" \
                PISTON_URL="http://greenroom-piston:2000/api/v2/execute" \
                ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}"

      - name: Deploy Piston to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name greenroom-piston \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.PISTON_IMAGE }}:latest
