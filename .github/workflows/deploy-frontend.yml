name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy React app

    steps:
      - uses: actions/checkout@v4

      # Bake production env vars into the Vite build.
      # VITE_API_URL is your Azure Container Apps backend URL.
      # Set it in GitHub → Settings → Secrets and variables → Actions → Secrets.
      - name: Write .env.production
        run: |
          {
            echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
            echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY"
            echo "VITE_API_URL=$VITE_API_URL"
          } > frontend/.env.production
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_api_build: true
